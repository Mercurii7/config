[keys.insert]
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"

[keys.normal]
up = "no_op"
down = "no_op"
left = "no_op"
right = "no_op"
esc = ["collapse_selection", "keep_primary_selection"]
pageup = "page_cursor_half_up"
pagedown = "page_cursor_half_down"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.soft-wrap]
enable = true

[editor]
true-color = true
mouse = false
line-number = "relative"
auto-format = true

[editor.inline-diagnostics]
cursor-line = "hint"
other-lines = "error"
